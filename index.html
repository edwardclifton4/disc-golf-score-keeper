<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Golf">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#060d06">
  <title>Golf Score</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin:0; padding:0; box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      -webkit-touch-callout:none; user-select:none;
    }
    :root {
      --bg:     #060d06;
      --text:   #eeeae0;
      --dim:    #3a4e3a;
      --yellow: #f5d020;
      --red:    #c04848;
      --mint:   #4caf6a;
    }
    html, body {
      width:100%; height:100%;
      overflow:hidden;
      overscroll-behavior:none;       /* stop iOS rubber-band */
      background:var(--bg);
    }
    body {
      display:flex; flex-direction:column;
      height:100vh; height:100dvh;
      font-family:'Oswald', sans-serif;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      flex-shrink:0;
      display:flex; flex-direction:column; align-items:center;
      padding-top:calc(env(safe-area-inset-top,20px) + 20px);
      padding-bottom:8px; gap:4px;
    }
    .h-top {
      display:flex; align-items:baseline; gap:0.4em;
      font-size:clamp(1rem,4.5vw,1.3rem);
      letter-spacing:0.1em; text-transform:uppercase;
    }
    .h-label { font-weight:300; color:var(--text); }
    .h-num   { font-weight:600; color:var(--text); }
    .h-status {
      font-size:clamp(0.85rem,3.5vw,1.05rem);
      font-weight:600; letter-spacing:0.12em;
      text-transform:uppercase; color:var(--yellow);
    }
    .h-status.over { color:var(--red); }

    /* ── Touch area ──────────────────────────── */
    .touch-area {
      flex:1; position:relative;
      display:flex; align-items:center; justify-content:center;
      touch-action:none;              /* tell browser: hands off */
    }

    /* ── Score ───────────────────────────────── */
    .score-num {
      font-size:clamp(110px,44vw,190px);
      font-weight:600; color:var(--text);
      line-height:1; letter-spacing:-0.02em;
      opacity:0; transform:scale(0.85);
      transition:opacity 0.15s, transform 0.15s;
      pointer-events:none;
    }
    .touch-area.scored .score-num { opacity:1; transform:scale(1); }

    @keyframes bumpUp  { 0%{transform:scale(1);color:var(--text)} 40%{transform:scale(1.13);color:var(--yellow)} 100%{transform:scale(1);color:var(--text)} }
    @keyframes bumpSet { 0%{transform:scale(1);color:var(--text)} 30%{transform:scale(1.18);color:var(--mint)}   70%{transform:scale(0.95);color:var(--mint)} 100%{transform:scale(1);color:var(--text)} }
    .score-num.anim-up  { animation:bumpUp  0.22s ease-out; }
    .score-num.anim-set { animation:bumpSet 0.28s ease-out; }

    /* ── Hold arc ────────────────────────────── */
    .hold-arc {
      position:absolute; top:22%; left:50%; transform:translateX(-50%);
      width:56px; height:56px;
      pointer-events:none; opacity:0; z-index:7; transition:opacity 0.12s;
    }
    .hold-arc.show { opacity:1; }
    .hold-arc .track { fill:none; stroke:rgba(245,208,32,0.15); stroke-width:3; }
    .hold-arc .fill  { fill:none; stroke:var(--yellow); stroke-width:3; stroke-linecap:round;
                       stroke-dasharray:140.7; stroke-dashoffset:140.7;
                       transform-origin:28px 28px; transform:rotate(-90deg); }

    /* ── Slide transitions ───────────────────── */
    @keyframes fromRight { from{opacity:0;transform:translateX(55px) scale(0.9)} to{opacity:1;transform:none} }
    @keyframes fromLeft  { from{opacity:0;transform:translateX(-55px) scale(0.9)} to{opacity:1;transform:none} }
    .slide-right .score-num { animation:fromRight 0.22s ease-out; }
    .slide-left  .score-num { animation:fromLeft  0.22s ease-out; }

    /* ── Finish screen ───────────────────────── */
    .finish-screen {
      position:fixed; inset:0; background:var(--bg);
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
      gap:20px; z-index:20;
      touch-action:none;
    }
    .finish-screen.active { display:flex; animation:fromRight 0.24s ease-out; }

    .finish-wrap { position:relative; width:270px; height:270px; }
    .finish-arc-svg {
      position:absolute; inset:0; width:100%; height:100%;
      opacity:0; transition:opacity 0.12s; pointer-events:none;
    }
    .finish-arc-svg.show { opacity:1; }
    .f-arc-track { fill:none; stroke:rgba(76,175,106,0.2); stroke-width:5; }
    .f-arc-fill  { fill:none; stroke:var(--mint); stroke-width:5; stroke-linecap:round;
                   stroke-dasharray:829; stroke-dashoffset:829;
                   transform-origin:135px 135px; transform:rotate(-90deg); }
    .finish-circle {
      position:absolute; inset:10px; border-radius:50%; background:var(--mint);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    }
    .f-line { font-weight:600; font-size:clamp(1.6rem,7vw,2.1rem); letter-spacing:0.1em; color:#060d06; line-height:1.1; }
    .finish-hint { font-weight:300; font-size:0.7rem; letter-spacing:0.3em; color:var(--dim); text-transform:uppercase; }

    /* ── Results screen ──────────────────────── */
    .results-screen {
      position:fixed; inset:0; background:var(--bg);
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
      gap:4px; z-index:25; touch-action:none;
    }
    .results-screen.active { display:flex; animation:fadeUp 0.3s ease-out; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

    .r-label { font-weight:300; font-size:0.7rem; letter-spacing:0.4em; color:var(--dim); text-transform:uppercase; margin-bottom:4px; }
    .r-total { font-weight:600; font-size:clamp(100px,42vw,180px); color:var(--text); line-height:1; letter-spacing:-0.02em; }
    .r-par   { font-weight:600; font-size:2rem; letter-spacing:0.06em; margin-top:6px; }
    .r-par.even  { color:var(--yellow); }
    .r-par.over  { color:var(--red);    }
    .r-par.under { color:var(--yellow); }
    .r-holes { font-weight:300; font-size:0.7rem; letter-spacing:0.25em; color:var(--dim); text-transform:uppercase; margin-top:12px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="h-top">
      <span class="h-label">Hole</span>
      <span class="h-num" id="holeNum">1</span>
    </div>
    <div class="h-status" id="statusText">Even</div>
  </div>

  <div class="touch-area" id="touchArea">
    <div class="score-num" id="scoreNum"></div>
    <svg class="hold-arc" id="holdArc" viewBox="0 0 56 56">
      <circle class="track" cx="28" cy="28" r="22.4"/>
      <circle class="fill"  cx="28" cy="28" r="22.4" id="holdFill"/>
    </svg>
  </div>

  <div class="finish-screen" id="finishScreen">
    <div class="finish-wrap">
      <svg class="finish-arc-svg" id="finishArcSvg" viewBox="0 0 270 270">
        <circle class="f-arc-track" cx="135" cy="135" r="132"/>
        <circle class="f-arc-fill"  cx="135" cy="135" r="132" id="finishArcFill"/>
      </svg>
      <div class="finish-circle">
        <span class="f-line">Finish</span>
        <span class="f-line">Round?</span>
      </div>
    </div>
    <div class="finish-hint">hold to confirm</div>
  </div>

  <div class="results-screen" id="resultsScreen">
    <div class="r-label">Total Score</div>
    <div class="r-total" id="rTotal">0</div>
    <div class="r-par"   id="rPar">Even</div>
    <div class="r-holes" id="rHoles"></div>
  </div>

<script>
  const HOLES       = 18;
  const DEFAULT     = 3;
  const HOLD_MS     = 500;
  const FINISH_HOLD = 1000;
  const SWIPE_PX    = 30;
  const PAR_HOLE    = 3;
  const CIRC        = 2 * Math.PI * 22.4;
  const FINISH_CIRC = 2 * Math.PI * 132;

  let scores   = loadScores();
  let hole     = loadHole();
  let appState = 'playing';

  const holeNumEl    = document.getElementById('holeNum');
  const statusEl     = document.getElementById('statusText');
  const scoreNumEl   = document.getElementById('scoreNum');
  const touchAreaEl  = document.getElementById('touchArea');
  const holdArcEl    = document.getElementById('holdArc');
  const holdFillEl   = document.getElementById('holdFill');
  const finishScrEl  = document.getElementById('finishScreen');
  const finishArcEl  = document.getElementById('finishArcSvg');
  const finishFillEl = document.getElementById('finishArcFill');
  const resultsScrEl = document.getElementById('resultsScreen');

  function saveState() {
    try { localStorage.setItem('gs6_s', JSON.stringify(scores)); localStorage.setItem('gs6_h', hole); } catch(e){}
  }
  function loadScores() {
    try { const s = localStorage.getItem('gs6_s'); if(s) return JSON.parse(s); } catch(e){}
    return new Array(HOLES).fill(0);
  }
  function loadHole() {
    try { const h = localStorage.getItem('gs6_h'); if(h!=null) return Math.min(parseInt(h,10),HOLES-1); } catch(e){}
    return 0;
  }

  function getStatus() {
    let str=0, par=0;
    scores.forEach(s => { if(s>0){str+=s; par+=PAR_HOLE;} });
    const d=str-par;
    if(d===0) return {text:'Even',cls:''};
    return d>0 ? {text:'+'+d,cls:'over'} : {text:''+d,cls:'under'};
  }

  function render(dir) {
    holeNumEl.textContent = hole+1;
    const has = scores[hole]>0;
    scoreNumEl.textContent = has ? scores[hole] : '';
    touchAreaEl.classList.toggle('scored', has);
    const {text,cls} = getStatus();
    statusEl.textContent = text;
    statusEl.className = 'h-status'+(cls?' '+cls:'');
    if(dir){
      touchAreaEl.classList.remove('slide-right','slide-left');
      void touchAreaEl.offsetWidth;
      touchAreaEl.classList.add('slide-'+dir);
      setTimeout(()=>touchAreaEl.classList.remove('slide-right','slide-left'),280);
    }
  }

  function animScore(t) {
    scoreNumEl.classList.remove('anim-up','anim-set');
    void scoreNumEl.offsetWidth;
    scoreNumEl.classList.add(t);
    setTimeout(()=>scoreNumEl.classList.remove(t),400);
  }

  function holdAction() {
    if(scores[hole]===0){scores[hole]=DEFAULT;animScore('anim-set');}
    else{scores[hole]=Math.min(scores[hole]+1,20);animScore('anim-up');}
    render(); saveState();
    try{navigator.vibrate([20,30,20]);}catch(e){}
  }
  function nextHole(){if(hole<HOLES-1){hole++;render('right');saveState();}else showFinish();}
  function prevHole(){if(hole>0){hole--;render('left');saveState();}}

  function startArc(){
    holdFillEl.style.transition='none'; holdFillEl.style.strokeDashoffset=CIRC;
    holdArcEl.classList.add('show'); void holdFillEl.offsetWidth;
    holdFillEl.style.transition=`stroke-dashoffset ${HOLD_MS}ms linear`; holdFillEl.style.strokeDashoffset='0';
  }
  function cancelArc(){
    holdArcEl.classList.remove('show'); holdFillEl.style.transition='none'; holdFillEl.style.strokeDashoffset=CIRC;
  }
  function startFinishArc(){
    finishFillEl.style.transition='none'; finishFillEl.style.strokeDashoffset=FINISH_CIRC;
    finishArcEl.classList.add('show'); void finishFillEl.offsetWidth;
    finishFillEl.style.transition=`stroke-dashoffset ${FINISH_HOLD}ms linear`; finishFillEl.style.strokeDashoffset='0';
  }
  function cancelFinishArc(){
    finishArcEl.classList.remove('show'); finishFillEl.style.transition='none'; finishFillEl.style.strokeDashoffset=FINISH_CIRC;
  }

  function showFinish(){appState='finish';finishScrEl.classList.add('active');}
  function hideFinish(){appState='playing';finishScrEl.classList.remove('active');}
  function showResults(){
    const total=scores.reduce((a,b)=>a+b,0);
    const played=scores.filter(s=>s>0).length;
    const diff=total-(played*PAR_HOLE);
    document.getElementById('rTotal').textContent=total||'—';
    const p=document.getElementById('rPar');
    if(!total){p.textContent='—';p.className='r-par even';}
    else if(diff===0){p.textContent='Even';p.className='r-par even';}
    else if(diff>0){p.textContent='+'+diff;p.className='r-par over';}
    else{p.textContent=''+diff;p.className='r-par under';}
    document.getElementById('rHoles').textContent=played+' of 18 holes scored';
    finishScrEl.classList.remove('active');
    resultsScrEl.classList.add('active');
    appState='results';
    try{navigator.vibrate([30,40,30]);}catch(e){}
  }

  // ── Gesture state ────────────────────────────
  let tX0=0, tXNow=0;
  let holdTimer=null, visTimer=null;
  let holdFired=false, swiping=false;
  let tracking=false;

  function onStart(x){
    tX0=tXNow=x; holdFired=false; swiping=false; tracking=true;
    if(appState==='finish'){
      startFinishArc();
      holdTimer=setTimeout(()=>{holdFired=true;cancelFinishArc();showResults();},FINISH_HOLD);
      return;
    }
    if(appState!=='playing') return;
    visTimer=setTimeout(startArc,60);
    holdTimer=setTimeout(()=>{holdFired=true;cancelArc();holdAction();},HOLD_MS);
  }

  function onMove(x){
    if(!tracking) return;
    tXNow=x;
    if(!swiping && Math.abs(tXNow-tX0)>12){
      swiping=true;
      clearTimeout(holdTimer); clearTimeout(visTimer); holdTimer=null;
      if(appState==='playing') cancelArc();
      else if(appState==='finish') cancelFinishArc();
    }
  }

  function onEnd(){
    if(!tracking) return;
    tracking=false;
    clearTimeout(holdTimer); clearTimeout(visTimer); holdTimer=null;
    if(appState==='finish'){
      cancelFinishArc();
      if(!holdFired && swiping && (tXNow-tX0)<-SWIPE_PX) hideFinish();
      return;
    }
    if(appState!=='playing') return;
    cancelArc();
    const dx=tXNow-tX0;
    if(swiping && Math.abs(dx)>SWIPE_PX){ dx>0 ? nextHole() : prevHole(); }
  }

  function onCancel(){
    tracking=false;
    clearTimeout(holdTimer); clearTimeout(visTimer);
    cancelArc(); cancelFinishArc();
  }

  // ── Attach events ────────────────────────────
  // Touch and mouse bound on each interactive element.
  // touchmove MUST be {passive:false} + preventDefault() to stop iOS scroll.
  function attach(el){
    el.addEventListener('touchstart',  e=>{e.preventDefault(); onStart(e.touches[0].clientX);}, {passive:false});
    el.addEventListener('touchmove',   e=>{e.preventDefault(); onMove(e.touches[0].clientX);},  {passive:false});
    el.addEventListener('touchend',    e=>{e.preventDefault(); onEnd();},                        {passive:false});
    el.addEventListener('touchcancel', e=>onCancel());
    el.addEventListener('mousedown',   e=>{e.preventDefault(); onStart(e.clientX);});
  }

  attach(touchAreaEl);
  attach(finishScrEl);

  // Mouse move/up on document so dragging outside element still works
  document.addEventListener('mousemove', e=>{if(tracking) onMove(e.clientX);});
  document.addEventListener('mouseup',   e=>{if(tracking) onEnd();});

  render();
</script>
</body>
</html>
