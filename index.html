<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Golf">
  <meta name="theme-color" content="#060d06">
  <title>Golf Score</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin:0; padding:0; box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      -webkit-touch-callout:none; user-select:none;
    }
    :root {
      --bg:     #060d06;
      --text:   #eeeae0;
      --dim:    #2e3e2e;
      --yellow: #f5d020;
      --red:    #c04848;
      --mint:   #4caf6a;
      --border: rgba(255,255,255,0.09);
    }
    html, body {
      position:fixed; overflow:hidden;
      width:100%; height:100%;
      background:var(--bg); overscroll-behavior:none;
    }
    body {
      display:flex; flex-direction:column;
      font-family:'Oswald', sans-serif;
      touch-action:none;
    }

    /* ══ TOP BAR ════════════════════════════════ */
    .topbar {
      flex-shrink:0;
      display:flex;
      padding-top: max(env(safe-area-inset-top,0px), 16px);
      border-bottom: 1px solid var(--border);
    }

    /* Each of the three cells */
    .nb {
      flex:1;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:14px 6px 16px;
      cursor:pointer;
      transition: background 0.1s;
    }
    .nb-prev   { border-right: 1px solid var(--border); }
    .nb-center { border-right: 1px solid var(--border); pointer-events:none; }

    .nb-prev.flash, .nb-next.flash {
      background: rgba(245,208,32,0.12);
      box-shadow: inset 0 0 30px rgba(245,208,32,0.15);
    }
    .nb-prev.flash .nb-num, .nb-next.flash .nb-num { color: var(--yellow); }

    /* Nav hole numbers */
    .nb-num {
      font-weight:600;
      font-size: min(10vw, 42px);
      line-height:1; color:var(--dim);
      transition: color 0.1s;
    }
    .nb-next .nb-num { color:var(--text); }

    /* Center cell labels */
    .h-top {
      display:flex; align-items:baseline; gap:0.35em;
      font-size:clamp(1.6rem,7.5vw,2.2rem);
      letter-spacing:0.1em; text-transform:uppercase;
    }
    .h-label { font-weight:300; color:var(--text); }
    .h-num   { font-weight:600; color:var(--text); }
    .h-status {
      font-size:clamp(1.2rem,6vw,1.7rem);
      font-weight:600; letter-spacing:0.12em;
      text-transform:uppercase; color:var(--yellow);
      margin-top:4px;
    }

    /* ══ MAIN AREA ══════════════════════════════ */
    .main-area {
      flex:1; position:relative;
      display:flex; align-items:center; justify-content:center;
      touch-action:none;
    }

    .score-num {
      font-size:clamp(110px,44vw,190px);
      font-weight:600; color:var(--text);
      line-height:1; letter-spacing:-0.02em;
      opacity:0; transform:scale(0.85);
      transition:opacity 0.15s, transform 0.15s;
      pointer-events:none;
    }
    .main-area.scored .score-num { opacity:1; transform:scale(1); }

    @keyframes bumpUp  { 0%{transform:scale(1);color:var(--text)} 40%{transform:scale(1.13);color:var(--yellow)} 100%{transform:scale(1);color:var(--text)} }
    @keyframes bumpSet { 0%{transform:scale(1);color:var(--text)} 30%{transform:scale(1.18);color:var(--mint)}   70%{transform:scale(0.95);color:var(--mint)} 100%{transform:scale(1);color:var(--text)} }
    .score-num.anim-up  { animation:bumpUp  0.22s ease-out; }
    .score-num.anim-set { animation:bumpSet 0.28s ease-out; }

    /* Faint side glyphs */
    .area-glyph {
      position:absolute;
      font-weight:300; font-size:2.5rem;
      color:var(--yellow); opacity:0.18;
      pointer-events:none;
    }
    .area-minus { left:7%; }
    .area-plus  { right:7%; }

    /* Hold arc */
    .hold-arc {
      position:absolute; top:20%; left:50%; transform:translateX(-50%);
      width:56px; height:56px;
      pointer-events:none; opacity:0; z-index:7; transition:opacity 0.12s;
    }
    .hold-arc.show { opacity:1; }
    .hold-arc .track { fill:none; stroke:rgba(245,208,32,0.15); stroke-width:3; }
    .hold-arc .fill  { fill:none; stroke:var(--yellow); stroke-width:3; stroke-linecap:round;
                       stroke-dasharray:140.7; stroke-dashoffset:140.7;
                       transform-origin:28px 28px; transform:rotate(-90deg); }

    /* ══ FINISH SCREEN ══════════════════════════ */
    .finish-screen {
      position:fixed; inset:0; background:var(--bg);
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
      gap:20px; z-index:20; touch-action:none;
    }
    .finish-screen.active { display:flex; }

    .finish-wrap { position:relative; width:270px; height:270px; }
    .finish-arc-svg {
      position:absolute; inset:0; width:100%; height:100%;
      opacity:0; transition:opacity 0.12s; pointer-events:none;
    }
    .finish-arc-svg.show { opacity:1; }
    .f-arc-track { fill:none; stroke:rgba(76,175,106,0.2); stroke-width:5; }
    .f-arc-fill  { fill:none; stroke:var(--mint); stroke-width:5; stroke-linecap:round;
                   stroke-dasharray:829; stroke-dashoffset:829;
                   transform-origin:135px 135px; transform:rotate(-90deg); }
    .finish-circle {
      position:absolute; inset:10px; border-radius:50%; background:var(--mint);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    }
    .f-line { font-weight:600; font-size:clamp(1.6rem,7vw,2.1rem); letter-spacing:0.1em; color:#060d06; line-height:1.1; }
    .finish-hint { font-weight:300; font-size:0.7rem; letter-spacing:0.3em; color:var(--yellow); text-transform:uppercase; }
    .finish-back { font-weight:300; font-size:0.65rem; letter-spacing:0.25em; color:var(--yellow); text-transform:uppercase; margin-top:4px; }

    /* ══ RESULTS SCREEN ══════════════════════════ */
    .results-screen {
      position:fixed; inset:0; background:var(--bg);
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
      gap:4px; z-index:25; touch-action:none;
    }
    .results-screen.active { display:flex; animation:fadeUp 0.3s ease-out; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

    .r-label { font-weight:300; font-size:0.7rem; letter-spacing:0.4em; color:var(--yellow); text-transform:uppercase; margin-bottom:4px; }
    .r-total { font-weight:600; font-size:clamp(100px,42vw,180px); color:var(--text); line-height:1; }
    .r-par   { font-weight:600; font-size:2rem; letter-spacing:0.06em; margin-top:6px; }
    .r-par.even  { color:var(--yellow); }
    .r-par.over  { color:var(--red);    }
    .r-par.under { color:var(--yellow); }
    .r-holes { font-weight:300; font-size:0.7rem; letter-spacing:0.25em; color:var(--yellow); text-transform:uppercase; margin-top:12px; }
    .new-game-btn {
      margin-top:36px;
      padding:16px 40px;
      background:transparent;
      border:2px solid var(--yellow);
      border-radius:4px;
      color:var(--yellow);
      font-family:'Oswald', sans-serif;
      font-size:1.2rem;
      font-weight:600;
      letter-spacing:0.2em;
      text-transform:uppercase;
      cursor:pointer;
      transition: background 0.15s, color 0.15s;
    }
    .new-game-btn:active {
      background:var(--yellow);
      color:var(--bg);
    }
  </style>
</head>
<body>

  <!-- ── Top bar: prev | current | next ── -->
  <div class="topbar">
    <div class="nb nb-prev" id="nbPrev">
      <span class="nb-num" id="prevNum"></span>
    </div>
    <div class="nb nb-center">
      <div class="h-top">
        <span class="h-label">Hole</span>
        <span class="h-num" id="holeNum">1</span>
      </div>
      <div class="h-status" id="statusText">Even</div>
    </div>
    <div class="nb nb-next" id="nbNext">
      <span class="nb-num" id="nextNum">2</span>
    </div>
  </div>

  <!-- ── Main scoring area ── -->
  <div class="main-area" id="mainArea">
    <span class="area-glyph area-minus">−</span>
    <div class="score-num" id="scoreNum"></div>
    <span class="area-glyph area-plus">+</span>
    <svg class="hold-arc" id="holdArc" viewBox="0 0 56 56">
      <circle class="track" cx="28" cy="28" r="22.4"/>
      <circle class="fill"  cx="28" cy="28" r="22.4" id="holdFill"/>
    </svg>
  </div>

  <!-- ── Finish screen ── -->
  <div class="finish-screen" id="finishScreen">
    <div class="finish-wrap">
      <svg class="finish-arc-svg" id="finishArcSvg" viewBox="0 0 270 270">
        <circle class="f-arc-track" cx="135" cy="135" r="132"/>
        <circle class="f-arc-fill"  cx="135" cy="135" r="132" id="finishArcFill"/>
      </svg>
      <div class="finish-circle">
        <span class="f-line">Finish</span>
        <span class="f-line">Round?</span>
      </div>
    </div>
    <div class="finish-hint">hold to confirm</div>
    <div class="finish-back" id="finishBack">tap here to go back</div>
  </div>

  <!-- ── Results screen ── -->
  <div class="results-screen" id="resultsScreen">
    <div class="r-label">Total Score</div>
    <div class="r-total" id="rTotal">0</div>
    <div class="r-par"   id="rPar">Even</div>
    <div class="r-holes" id="rHoles"></div>
    <button class="new-game-btn" id="newGameBtn">New Game?</button>
  </div>

<script>
  const HOLES       = 18;
  const DEFAULT     = 3;
  const HOLD_MS     = 500;
  const FINISH_HOLD = 1000;
  const PAR_HOLE    = 3;
  const CIRC        = 2 * Math.PI * 22.4;
  const FINISH_CIRC = 2 * Math.PI * 132;

  let scores   = loadScores();
  let hole     = loadHole();
  let appState = 'playing';

  const holeNumEl    = document.getElementById('holeNum');
  const statusEl     = document.getElementById('statusText');
  const prevNumEl    = document.getElementById('prevNum');
  const nextNumEl    = document.getElementById('nextNum');
  const nbPrevEl     = document.getElementById('nbPrev');
  const nbNextEl     = document.getElementById('nbNext');
  const mainAreaEl   = document.getElementById('mainArea');
  const scoreNumEl   = document.getElementById('scoreNum');
  const holdArcEl    = document.getElementById('holdArc');
  const holdFillEl   = document.getElementById('holdFill');
  const finishScrEl  = document.getElementById('finishScreen');
  const finishArcEl  = document.getElementById('finishArcSvg');
  const finishFillEl = document.getElementById('finishArcFill');
  const resultsScrEl = document.getElementById('resultsScreen');

  function saveState(){
    try{localStorage.setItem('gs8_s',JSON.stringify(scores));localStorage.setItem('gs8_h',hole);}catch(e){}
  }
  function loadScores(){
    try{const s=localStorage.getItem('gs8_s');if(s)return JSON.parse(s);}catch(e){}
    return new Array(HOLES).fill(0);
  }
  function loadHole(){
    try{const h=localStorage.getItem('gs8_h');if(h!=null)return Math.min(parseInt(h,10),HOLES-1);}catch(e){}
    return 0;
  }

  function getStatus(){
    let str=0,par=0;
    scores.forEach(s=>{if(s>0){str+=s;par+=PAR_HOLE;}});
    const d=str-par;
    if(d===0)return{text:'Even',cls:''};
    return d>0?{text:'+'+d,cls:'over'}:{text:''+d,cls:'under'};
  }

  function render(){
    holeNumEl.textContent = hole+1;
    // Left nav cell: previous hole
    prevNumEl.textContent = hole > 0 ? hole : '';
    // Right nav cell: next hole or END
    nextNumEl.textContent = hole < HOLES-1 ? hole+2 : 'End';
    // Score
    const has = scores[hole]>0;
    scoreNumEl.textContent = has ? scores[hole] : '';
    mainAreaEl.classList.toggle('scored', has);
    // Status
    const {text,cls} = getStatus();
    statusEl.textContent = text;
    statusEl.className = 'h-status'+(cls?' '+cls:'');
  }

  function animScore(t){
    scoreNumEl.classList.remove('anim-up','anim-set');
    void scoreNumEl.offsetWidth;
    scoreNumEl.classList.add(t);
    setTimeout(()=>scoreNumEl.classList.remove(t),400);
  }

  function holdAction(){
    if(scores[hole]===0){scores[hole]=DEFAULT;animScore('anim-set');}
    else{scores[hole]=Math.min(scores[hole]+1,20);animScore('anim-up');}
    render(); saveState();
    try{navigator.vibrate([20,30,20]);}catch(e){}
  }

  function goNext(){
    if(hole<HOLES-1){hole++;render();saveState();}
    else showFinish();
  }
  function goPrev(){
    if(hole>0){hole--;render();saveState();}
  }

  // ── Scoring hold arc ─────────────────────────
  function startArc(){
    holdFillEl.style.transition='none';holdFillEl.style.strokeDashoffset=CIRC;
    holdArcEl.classList.add('show');void holdFillEl.offsetWidth;
    holdFillEl.style.transition=`stroke-dashoffset ${HOLD_MS}ms linear`;holdFillEl.style.strokeDashoffset='0';
  }
  function cancelArc(){
    holdArcEl.classList.remove('show');holdFillEl.style.transition='none';holdFillEl.style.strokeDashoffset=CIRC;
  }

  // ── Finish arc ────────────────────────────────
  function startFinishArc(){
    finishFillEl.style.transition='none';finishFillEl.style.strokeDashoffset=FINISH_CIRC;
    finishArcEl.classList.add('show');void finishFillEl.offsetWidth;
    finishFillEl.style.transition=`stroke-dashoffset ${FINISH_HOLD}ms linear`;finishFillEl.style.strokeDashoffset='0';
  }
  function cancelFinishArc(){
    finishArcEl.classList.remove('show');finishFillEl.style.transition='none';finishFillEl.style.strokeDashoffset=FINISH_CIRC;
  }

  function showFinish(){appState='finish';finishScrEl.classList.add('active');}
  function hideFinish(){appState='playing';finishScrEl.classList.remove('active');}

  function showResults(){
    const total=scores.reduce((a,b)=>a+b,0);
    const played=scores.filter(s=>s>0).length;
    const diff=total-(played*PAR_HOLE);
    document.getElementById('rTotal').textContent=total||'—';
    const p=document.getElementById('rPar');
    if(!total){p.textContent='—';p.className='r-par even';}
    else if(diff===0){p.textContent='Even';p.className='r-par even';}
    else if(diff>0){p.textContent='+'+diff;p.className='r-par over';}
    else{p.textContent=''+diff;p.className='r-par under';}
    document.getElementById('rHoles').textContent=played+' of 18 holes scored';
    finishScrEl.classList.remove('active');
    resultsScrEl.classList.add('active');
    appState='results';
    try{navigator.vibrate([30,40,30]);}catch(e){}
  }

  // ── NAV CELLS: simple tap to navigate ────────
  // No swipe needed. Tap left = prev hole, tap right = next hole.
  function attachNavCell(el, action){
    let sx=0;
    el.addEventListener('touchstart', e=>{
      e.preventDefault();
      sx = e.touches[0].clientX;
      el.classList.add('flash');
    },{passive:false});
    el.addEventListener('touchend', e=>{
      e.preventDefault();
      el.classList.remove('flash');
      const dx = e.changedTouches[0].clientX - sx;
      if(Math.abs(dx) < 30 && appState==='playing') action();
    },{passive:false});
    el.addEventListener('touchcancel', ()=>el.classList.remove('flash'));
    // Mouse
    let msx=0;
    el.addEventListener('mousedown', e=>{e.preventDefault();msx=e.clientX;el.classList.add('flash');});
    el.addEventListener('mouseup', e=>{el.classList.remove('flash');if(Math.abs(e.clientX-msx)<30&&appState==='playing')action();});
    el.addEventListener('mouseleave', ()=>el.classList.remove('flash'));
  }

  attachNavCell(nbPrevEl, goPrev);
  attachNavCell(nbNextEl, goNext);

  // ── MAIN AREA: hold to score ──────────────────
  let holdTimer=null, visTimer=null, holdFired=false, mainStartX=0, mainStartY=0;

  function mainStart(x,y){
    mainStartX=x; mainStartY=y; holdFired=false;
    visTimer  = setTimeout(startArc, 60);
    holdTimer = setTimeout(()=>{holdFired=true;cancelArc();holdAction();},HOLD_MS);
  }
  function mainEnd(xEnd,yEnd){
    clearTimeout(holdTimer);clearTimeout(visTimer);holdTimer=null;
    cancelArc();
    // no tap action — hold only
  }
  function mainCancel(){
    clearTimeout(holdTimer);clearTimeout(visTimer);holdTimer=null;
    cancelArc();
  }

  mainAreaEl.addEventListener('touchstart', e=>{e.preventDefault();mainStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  mainAreaEl.addEventListener('touchend',   e=>{e.preventDefault();mainEnd(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  mainAreaEl.addEventListener('touchcancel',e=>mainCancel());
  let mDown=false;
  mainAreaEl.addEventListener('mousedown', e=>{e.preventDefault();mDown=true;mainStart(e.clientX,e.clientY);});
  document.addEventListener('mouseup', e=>{if(mDown){mDown=false;mainEnd(e.clientX,e.clientY);}});

  // ── FINISH SCREEN: hold to confirm, tap back ─
  let fHoldTimer=null, fHoldFired=false;
  finishScrEl.addEventListener('touchstart', e=>{
    e.preventDefault();
    if(e.target===document.getElementById('finishBack')){hideFinish();return;}
    fHoldFired=false;
    startFinishArc();
    fHoldTimer=setTimeout(()=>{fHoldFired=true;cancelFinishArc();showResults();},FINISH_HOLD);
  },{passive:false});
  finishScrEl.addEventListener('touchend', e=>{
    e.preventDefault();
    clearTimeout(fHoldTimer);
    if(!fHoldFired) cancelFinishArc();
  },{passive:false});
  finishScrEl.addEventListener('touchcancel',()=>{clearTimeout(fHoldTimer);cancelFinishArc();});
  // Mouse
  let fmDown=false;
  finishScrEl.addEventListener('mousedown', e=>{
    if(e.target===document.getElementById('finishBack')){hideFinish();return;}
    fmDown=true; fHoldFired=false;
    startFinishArc();
    fHoldTimer=setTimeout(()=>{fHoldFired=true;cancelFinishArc();showResults();},FINISH_HOLD);
  });
  document.addEventListener('mouseup', e=>{
    if(fmDown){fmDown=false;clearTimeout(fHoldTimer);if(!fHoldFired)cancelFinishArc();}
  });

  document.getElementById('newGameBtn').addEventListener('click', () => {
    scores = new Array(HOLES).fill(0);
    hole = 0;
    appState = 'playing';
    resultsScrEl.classList.remove('active');
    saveState();
    render();
  });

  render();
</script>
</body>
</html>
